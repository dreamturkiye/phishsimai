on: { pull_request: {}, push: { branches: [dev, main] } }
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node ci/check-imports.mjs
      - run: node ci/check-core-drift.mjs server/os/kaan-os-core
      - run: npm run check
      - run: npm run build
